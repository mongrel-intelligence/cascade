coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "src/**/*.test.ts"
  - "src/types/**"
  - "web/**"
  - "tools/**"
  - "tests/**"
