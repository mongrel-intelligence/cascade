name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ROUTER_IMAGE: ghcr.io/zbigniewsobiecki/cascade-router
  WORKER_IMAGE: ghcr.io/zbigniewsobiecki/cascade-worker

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push router image
        run: |
          docker build -f Dockerfile.router -t ${{ env.ROUTER_IMAGE }}:latest -t ${{ env.ROUTER_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.ROUTER_IMAGE }}:latest
          docker push ${{ env.ROUTER_IMAGE }}:${{ github.sha }}

      - name: Build and push worker image
        run: |
          docker build -f Dockerfile.worker -t ${{ env.WORKER_IMAGE }}:latest -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}

      - name: Restart cascade-router
        run: |
          cd /opt/services
          docker compose up -d cascade-router
