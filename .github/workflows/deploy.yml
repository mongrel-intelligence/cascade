name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ROUTER_IMAGE: ghcr.io/zbigniewsobiecki/cascade-router
  WORKER_IMAGE: ghcr.io/zbigniewsobiecki/cascade-worker
  DASHBOARD_IMAGE: ghcr.io/zbigniewsobiecki/cascade-dashboard

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push router image
        run: |
          docker build -f Dockerfile.router -t ${{ env.ROUTER_IMAGE }}:latest -t ${{ env.ROUTER_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.ROUTER_IMAGE }}:latest
          docker push ${{ env.ROUTER_IMAGE }}:${{ github.sha }}

      - name: Build and push worker image
        run: |
          docker build -f Dockerfile.worker -t ${{ env.WORKER_IMAGE }}:latest -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}

      - name: Build and push dashboard image
        run: |
          docker build -f Dockerfile.dashboard -t ${{ env.DASHBOARD_IMAGE }}:latest -t ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.DASHBOARD_IMAGE }}:latest
          docker push ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

      - name: Build and deploy frontend to Cloudflare Pages
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_API_URL=https://api.ca.sca.de.com \
            -t cascade-frontend:build .
          docker run --rm \
            -e CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -e CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            cascade-frontend:build

      - name: Run database migrations
        if: ${{ secrets.DATABASE_URL != '' }}
        run: |
          docker build --target=builder -f Dockerfile.dashboard -t cascade-migrator:latest .
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            cascade-migrator:latest \
            ./node_modules/.bin/drizzle-kit migrate

      - name: Restart cascade-router
        run: |
          cd /opt/services
          docker compose up -d --force-recreate cascade-router

      - name: Verify cascade-router is healthy
        run: |
          echo "Waiting for cascade-router to start..."
          for i in $(seq 1 30); do
            if docker inspect cascade-router --format '{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
              echo "cascade-router is healthy"
              exit 0
            fi
            if docker inspect cascade-router --format '{{.State.Status}}' 2>/dev/null | grep -q restarting; then
              echo "ERROR: cascade-router is crashlooping!"
              docker logs cascade-router --tail 20
              exit 1
            fi
            sleep 5
          done
          echo "ERROR: cascade-router did not become healthy within 150s"
          docker logs cascade-router --tail 20
          exit 1

      - name: Restart cascade-dashboard
        run: |
          cd /opt/services
          docker compose up -d --force-recreate cascade-dashboard

      - name: Verify cascade-dashboard is healthy
        run: |
          echo "Waiting for cascade-dashboard to start..."
          for i in $(seq 1 30); do
            if docker inspect cascade-dashboard --format '{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
              echo "cascade-dashboard is healthy"
              exit 0
            fi
            if docker inspect cascade-dashboard --format '{{.State.Status}}' 2>/dev/null | grep -q restarting; then
              echo "ERROR: cascade-dashboard is crashlooping!"
              docker logs cascade-dashboard --tail 20
              exit 1
            fi
            sleep 5
          done
          echo "ERROR: cascade-dashboard did not become healthy within 150s"
          docker logs cascade-dashboard --tail 20
          exit 1
