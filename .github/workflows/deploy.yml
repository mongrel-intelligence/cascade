name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ROUTER_IMAGE: ghcr.io/mongrel-intelligence/cascade-router
  WORKER_IMAGE: ghcr.io/mongrel-intelligence/cascade-worker
  DASHBOARD_IMAGE: ghcr.io/mongrel-intelligence/cascade-dashboard

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: self-hosted
    environment: CI
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push router image
        run: |
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            -f Dockerfile.router \
            -t ${{ env.ROUTER_IMAGE }}:latest \
            -t ${{ env.ROUTER_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.ROUTER_IMAGE }}:latest
          docker push ${{ env.ROUTER_IMAGE }}:${{ github.sha }}

      - name: Validate router image (smoke test)
        run: |
          docker run --rm ${{ env.ROUTER_IMAGE }}:${{ github.sha }} \
            node --check dist/router/index.js

      - name: Build and push worker image
        run: |
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --no-cache \
            -f Dockerfile.worker \
            -t ${{ env.WORKER_IMAGE }}:latest \
            -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}

      - name: Build and push dashboard image
        run: |
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            -f Dockerfile.dashboard \
            -t ${{ env.DASHBOARD_IMAGE }}:latest \
            -t ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} .
          docker push ${{ env.DASHBOARD_IMAGE }}:latest
          docker push ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

      - name: Build and deploy frontend to Cloudflare Pages
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_API_URL=https://api.ca.sca.de.com \
            -t cascade-frontend:build .
          docker run --rm \
            -e CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -e CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            cascade-frontend:build

      - name: Run database migrations
        run: |
          docker build --target=builder -f Dockerfile.dashboard -t cascade-migrator:latest .
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_SSL=false \
            cascade-migrator:latest \
            ./node_modules/.bin/drizzle-kit migrate

      - name: Run trigger config migration
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_SSL=false \
            cascade-migrator:latest \
            npx tsx tools/migrate-triggers.ts

      - name: Run hooks migration
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_SSL=false \
            cascade-migrator:latest \
            npx tsx tools/migrate-hooks.ts --apply

      - name: Re-encrypt project credentials with project-scoped AAD
        run: |
          docker run --rm \
            --env-file /opt/services/cascade.env \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_SSL=false \
            cascade-migrator:latest \
            npx tsx tools/migrate-project-credentials-reencrypt.ts

      - name: Configure DATABASE_SSL for production (Supabase certificate)
        run: |
          docker run --rm \
            -v /opt/services:/mnt/services \
            alpine:3 sh -c '
              grep -v "^DATABASE_SSL=" /mnt/services/cascade.env > /tmp/new.env 2>/dev/null || true
              echo "DATABASE_SSL=false" >> /tmp/new.env
              cp /tmp/new.env /mnt/services/cascade.env
            '

      - name: Pull latest worker image
        run: docker pull ${{ env.WORKER_IMAGE }}:latest

      - name: Pull and restart cascade-router
        run: |
          cd /opt/services
          docker compose pull cascade-router
          docker compose up -d --force-recreate cascade-router

      - name: Verify cascade-router is healthy
        run: |
          echo "Waiting for cascade-router to start..."
          for i in $(seq 1 30); do
            if docker inspect cascade-router --format '{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
              echo "cascade-router is healthy"
              exit 0
            fi
            if docker inspect cascade-router --format '{{.State.Status}}' 2>/dev/null | grep -q restarting; then
              echo "ERROR: cascade-router is crashlooping!"
              docker logs cascade-router --tail 20
              exit 1
            fi
            sleep 5
          done
          echo "ERROR: cascade-router did not become healthy within 150s"
          docker logs cascade-router --tail 20
          exit 1

      - name: Verify cascade-router image
        run: |
          EXPECTED=$(docker image inspect ${{ env.ROUTER_IMAGE }}:${{ github.sha }} --format '{{.Id}}')
          RUNNING=$(docker inspect cascade-router --format '{{.Image}}')
          if [ "$EXPECTED" != "$RUNNING" ]; then
            echo "ERROR: cascade-router is running a stale image!"
            echo "  Expected (${{ github.sha }}): $EXPECTED"
            echo "  Running:                      $RUNNING"
            exit 1
          fi
          echo "cascade-router image verified (commit ${{ github.sha }})"

      - name: Verify cascade-router runtime revision and worker image
        run: |
          REVISION=$(docker inspect cascade-router --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          WORKER_IMAGE=$(docker inspect cascade-router --format '{{range .Config.Env}}{{println .}}{{end}}' | grep '^WORKER_IMAGE=' | cut -d= -f2-)
          if [ "$REVISION" != "${{ github.sha }}" ]; then
            echo "ERROR: cascade-router revision label does not match deployed commit!"
            echo "  Expected revision: ${{ github.sha }}"
            echo "  Running revision:  $REVISION"
            exit 1
          fi
          if [ "$WORKER_IMAGE" != "${{ env.WORKER_IMAGE }}:latest" ]; then
            echo "ERROR: cascade-router is configured to launch the wrong worker image!"
            echo "  Expected worker image: ${{ env.WORKER_IMAGE }}:latest"
            echo "  Running worker image:  $WORKER_IMAGE"
            exit 1
          fi
          echo "cascade-router runtime verified"

      - name: Pull and restart cascade-dashboard
        run: |
          cd /opt/services
          docker compose pull cascade-dashboard
          docker compose up -d --force-recreate cascade-dashboard

      - name: Verify cascade-dashboard is healthy
        run: |
          echo "Waiting for cascade-dashboard to start..."
          for i in $(seq 1 30); do
            if docker inspect cascade-dashboard --format '{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
              echo "cascade-dashboard is healthy"
              exit 0
            fi
            if docker inspect cascade-dashboard --format '{{.State.Status}}' 2>/dev/null | grep -q restarting; then
              echo "ERROR: cascade-dashboard is crashlooping!"
              docker logs cascade-dashboard --tail 20
              exit 1
            fi
            sleep 5
          done
          echo "ERROR: cascade-dashboard did not become healthy within 150s"
          docker logs cascade-dashboard --tail 20
          exit 1

      - name: Verify cascade-dashboard image
        run: |
          EXPECTED=$(docker image inspect ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} --format '{{.Id}}')
          RUNNING=$(docker inspect cascade-dashboard --format '{{.Image}}')
          if [ "$EXPECTED" != "$RUNNING" ]; then
            echo "ERROR: cascade-dashboard is running a stale image!"
            echo "  Expected (${{ github.sha }}): $EXPECTED"
            echo "  Running:                      $RUNNING"
            exit 1
          fi
          echo "cascade-dashboard image verified (commit ${{ github.sha }})"

      - name: Verify cascade-dashboard runtime revision
        run: |
          REVISION=$(docker inspect cascade-dashboard --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          if [ "$REVISION" != "${{ github.sha }}" ]; then
            echo "ERROR: cascade-dashboard revision label does not match deployed commit!"
            echo "  Expected revision: ${{ github.sha }}"
            echo "  Running revision:  $REVISION"
            exit 1
          fi
          echo "cascade-dashboard runtime verified"

      - name: Verify worker image tag
        run: |
          EXPECTED=$(docker image inspect ${{ env.WORKER_IMAGE }}:${{ github.sha }} --format '{{.Id}}')
          TAGGED=$(docker image inspect ${{ env.WORKER_IMAGE }}:latest --format '{{.Id}}')
          if [ "$EXPECTED" != "$TAGGED" ]; then
            echo "ERROR: worker :latest tag does not point to the expected build!"
            echo "  Expected (${{ github.sha }}): $EXPECTED"
            echo "  :latest resolves to:          $TAGGED"
            exit 1
          fi
          echo "Worker image verified: :latest tag matches commit ${{ github.sha }}"
