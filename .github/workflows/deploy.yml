name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ROUTER_IMAGE: ghcr.io/zbigniewsobiecki/cascade-router
  WORKER_IMAGE: ghcr.io/zbigniewsobiecki/cascade-worker

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push router image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.router
          push: true
          tags: |
            ${{ env.ROUTER_IMAGE }}:latest
            ${{ env.ROUTER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Bauer
    runs-on: self-hosted
    needs: build
    steps:
      - name: Pull and restart cascade-router
        run: |
          cd /home/zbigniew/infra/compose
          docker compose pull cascade-router
          docker compose up -d cascade-router
