app = "cascade-webhooks"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  LOG_LEVEL = "debug"
  LLMIST_LOG_LEVEL = "debug"
  CONFIG_PATH = "./config/projects.json"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2
