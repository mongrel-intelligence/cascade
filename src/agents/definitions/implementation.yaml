identity:
  emoji: "\U0001F9D1\u200D\U0001F4BB"
  label: Implementation Update
  roleHint: Writes code, runs tests, and prepares a pull request
  initialMessage: "**\U0001F680 Implementing changes** — Writing code, running tests, and preparing a PR..."

# Explicit integration requirements.
integrations:
  required: [pm, scm]
  optional: []

# Capabilities define what the agent can do.
# Integrations and tools are DERIVED from these capabilities.
capabilities:
  required:
    - fs:read
    - fs:write
    - shell:exec
    - session:ctrl
    - pm:read
    - pm:write
    - pm:checklist
    - scm:pr
  optional: []

# Supported triggers for this agent
triggers:
  - event: pm:card-moved
    label: Card Moved to Todo
    description: Trigger when card moved to Todo list
    defaultEnabled: true
    providers: [trello]
    parameters:
      - name: targetList
        type: select
        label: Target List
        options: [todo]
        defaultValue: todo
    # contextPipeline can be specified per-trigger to override strategies.contextPipeline
    # Currently using strategy default: [directoryListing, contextFiles, squint, workItem]
  - event: pm:issue-transitioned
    label: Issue Transitioned
    description: Trigger when issue transitions to Todo status
    defaultEnabled: true
    providers: [jira]
    parameters:
      - name: targetStatus
        type: select
        label: Target Status
        options: [todo]
        defaultValue: todo
  - event: pm:label-added
    label: Ready to Process Label
    description: Trigger when Ready to Process label added to a card in the Todo list
    defaultEnabled: true
    parameters:
      - name: listKey
        type: select
        label: Target List
        options: [todo]
        defaultValue: todo

strategies:
  contextPipeline: [directoryListing, contextFiles, squint, workItem]

prompts:
  taskPrompt: |
    Analyze and process the work item with ID: <%= it.cardId %>. The work item data has been pre-loaded.

backend:
  enableStopHooks: true
  needsGitHubToken: true
  requiresPR: true
  postConfigure: sequentialGadgetExecution

compaction: implementation

hint: >-
  Complete the current todo in as few iterations as possible. Batch related
  edits together. Verify with Tmux after edits. NEVER mark acceptance criteria
  complete without passing verification.

trailingMessage:
  includeDiagnostics: true
  includeTodoProgress: true
  includeGitStatus: true
  includePRStatus: true
  includeReminder: true
