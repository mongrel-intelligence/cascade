identity:
  emoji: "\U0001F4AC"
  label: Planning Response Update
  roleHint: Reads user feedback and updates the plan accordingly
  initialMessage: "**\U0001F4AC Responding to feedback** — Reading your comment and updating the plan accordingly..."

# Explicit integration requirements.
integrations:
  required: [pm]
  optional: []

# Can update PM checklists to respond to feedback, but no file editing.
capabilities:
  required:
    - fs:read
    - shell:exec
    - session:ctrl
    - pm:read
    - pm:write
    - pm:checklist
  optional: []

# Supported triggers for this agent
# Note: This agent is triggered via pm:comment-mention shared with planning agent
triggers:
  - event: pm:comment-mention
    label: Comment @mention
    description: Trigger when bot is @mentioned in a card/issue comment
    defaultEnabled: true
    contextPipeline: [directoryListing, contextFiles, squint, workItem]

strategies: {}

prompts:
  taskPrompt: |
    A user (@<%= it.commentAuthor %>) mentioned you in a comment on work item <%= it.cardId %>.

    Their comment:
    ---
    <%= it.commentText %>
    ---

    The work item data (title, description, checklists, attachments, comments) has been pre-loaded above.
    Read the user's comment carefully and classify it: if they ask a question or request clarification, reply with a thorough answer via PostComment (do not modify the plan). If they request plan changes, make surgical, targeted updates. If the comment contains both a question and a change request, do both. Default to plan updates when intent is ambiguous.

backend:
  enableStopHooks: false
  needsGitHubToken: false


hint: Complete the current task efficiently before moving to the next.
