identity:
  emoji: "\U0001F527"
  label: CI Fix Update
  roleHint: Analyzes failed CI checks and works on a fix
  initialMessage: "**\U0001F527 Fixing CI failures** — Analyzing the failed checks and working on a fix..."

# Explicit integration requirements.
integrations:
  required: [scm]
  optional: [pm]

# Can edit files and read SCM, optional PM for status updates.
capabilities:
  required:
    - fs:read
    - fs:write
    - shell:exec
    - session:ctrl
    - scm:read
    - scm:comment
  optional:
    - pm:read
    - pm:write
    - pm:checklist

# Supported triggers for this agent
triggers:
  - event: scm:check-suite-failure
    label: Check Suite Failure
    description: Trigger when CI checks fail
    defaultEnabled: true
    providers: [github]
    contextPipeline: [prContext, directoryListing, contextFiles, squint, workItem]

strategies: {}

prompts:
  taskPrompt: |
    You are on the branch `<%= it.prBranch %>` for PR #<%= it.prNumber %>.

    CI checks have failed. Analyze the failures and fix them.

hooks:
  trailing:
    builtin:
      diagnostics: true
  finish:
    scm:
      requiresPushedChanges: true
      blockGitPush: false

hint: Fix CI failures with minimal, focused changes. Batch related file edits together.
