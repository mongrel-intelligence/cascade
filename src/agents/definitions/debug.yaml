identity:
  emoji: "\U0001F41B"
  label: Debug Update
  roleHint: Analyzes session logs to identify what went wrong
  initialMessage: "**\U0001F41B Analyzing session logs** — Reviewing what happened and identifying issues..."

# Read-only FS access for log analysis, full PM access for creating debug cards.
capabilities:
  required:
    - fs:read
    - shell:exec
    - session:ctrl
    - pm:read
    - pm:write
    - pm:checklist
  optional: []

strategies:
  contextPipeline: [directoryListing, contextFiles, squint, workItem]

prompts:
  taskPrompt: |
    Analyze and process the work item with ID: <%= it.cardId %>. The work item data has been pre-loaded.

backend:
  enableStopHooks: true
  needsGitHubToken: false

compaction: default

hint: Analyze the current issue fully before moving to the next.
