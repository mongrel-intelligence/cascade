identity:
  emoji: "\U0001F602"
  label: Email Joke Responder
  roleHint: Reads emails from a specific sender and responds with jokes
  initialMessage: "**\U0001F602 Checking for emails to respond to with jokes**"

# Minimal agent with email access only.
# No file editing, no GitHub, no PM tools.
capabilities:
  required:
    - session:ctrl
    - email:read
    - email:write
  optional: []

strategies:
  contextPipeline: [prefetchedEmails]

prompts:
  taskPrompt: |
    ## Your Task

    Your initial email search has already been completed — see the **SearchEmails** result above.

    For each email found:
    1. Use **ReadEmail** to read the full content
    2. Compose a friendly, funny response that relates to the email content
    3. Use **ReplyToEmail** to send your joke response
    4. Use **MarkEmailAsSeen** to mark the email as read (prevents re-processing)

    Once all emails have been processed, call **Finish**.

    <% if (it.senderEmail) { %>
    ## Sender Filter
    Only emails from **<%= it.senderEmail %>** were included in the search.
    <% } %>

backend:
  enableStopHooks: false
  needsGitHubToken: false

compaction: default

trailingMessage: {}

hint: >-
  Search for emails, read them, and send funny responses. Mark processed emails
  as seen to prevent re-processing.
