identity:
  emoji: "\U0001F50D"
  label: Code Review Update
  roleHint: Reviews pull request changes for quality and correctness
  initialMessage: "**\U0001F50D Reviewing code** — Examining the PR changes for quality and correctness..."

# Explicit integration requirements.
integrations:
  required: [scm]
  optional: [pm]

# Read-only agent that reviews PRs. Can submit reviews and update comments.
# Optional PM for reading linked work item context.
capabilities:
  required:
    - fs:read
    - shell:exec
    - session:ctrl
    - scm:read
    - scm:review
    - scm:comment
  optional:
    - pm:read

# Supported triggers for this agent
triggers:
  - event: scm:check-suite-success
    label: CI Passed
    description: Trigger review when CI checks pass on a PR
    defaultEnabled: false
    providers: [github]
    parameters:
      - name: authorMode
        type: select
        label: Author Filter
        description: Filter PRs by author type
        options: [own, external, all]
        defaultValue: own
    contextPipeline: [prContext, contextFiles, squint]
  - event: scm:review-requested
    label: On Review Requested
    description: Trigger review when a CASCADE persona is explicitly requested as reviewer
    defaultEnabled: false
    providers: [github]
    contextPipeline: [prContext, contextFiles, squint]
  - event: scm:pr-opened
    label: PR Opened
    description: Trigger review when a new PR is opened (without waiting for CI)
    defaultEnabled: false
    providers: [github]
    parameters:
      - name: authorMode
        type: select
        label: Author Filter
        description: Filter PRs by author type
        options: [own, external, all]
        defaultValue: own
    contextPipeline: [prContext, contextFiles, squint]
  - event: scm:pr-ready-to-merge
    label: PR Ready to Merge
    description: Move work item to DONE when PR is approved and all checks pass
    defaultEnabled: true
    providers: [github]
    contextPipeline: []
  - event: scm:pr-merged
    label: PR Merged
    description: Move work item to MERGED status when PR is merged
    defaultEnabled: true
    providers: [github]
    contextPipeline: []

strategies: {}

prompts:
  taskPrompt: |
    Review PR #<%= it.prNumber %>.

    Examine the code changes carefully and submit your review using CreatePRReview.

hooks:
  finish:
    scm:
      requiresReview: true

hint: Focus on the current aspect of review before moving to the next. Read related files together.
