app = "cascade-router"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.router"

[env]
  PORT = "3000"
  CONFIG_PATH = "./config/projects.json"
  WORKER_URL = "https://cascade-webhooks.fly.dev/trello/webhook"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
