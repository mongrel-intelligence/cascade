pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npx biome check --write {staged_files}
      stage_fixed: true
    typecheck:
      run: npx tsc --noEmit

pre-push:
  parallel: true
  commands:
    test:
      run: npm run test:fast
    # test-integration requires Docker which is not available in this environment
    # test-integration:
    #   run: npm run test:db:up && npm run test:integration

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
